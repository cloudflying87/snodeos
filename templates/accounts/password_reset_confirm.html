{% extends 'base.html' %}

{% block title %}Set New Password — Brainerd Snodeos{% endblock %}

{% block content %}
<section class="py-6">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4 p-lg-5">
          <div class="text-center mb-4">
            <i class="bi bi-lock display-3 text-primary"></i>
            <h3 class="fw-bold font-oswald mt-2">Set New Password</h3>
          </div>
          {% if validlink %}
            <form method="post">
              {% csrf_token %}
              {{ form.as_p }}
              <button type="submit" class="btn btn-primary w-100 mt-2">Set Password</button>
            </form>
          {% else %}
            <div class="alert alert-danger">This reset link is invalid or has expired. <a href="{% url 'accounts:password_reset' %}">Request a new one.</a></div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
