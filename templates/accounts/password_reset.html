{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Password Reset — Brainerd Snodeos{% endblock %}

{% block content %}
<section class="py-6">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4 p-lg-5">
          <div class="text-center mb-4">
            <i class="bi bi-key display-3 text-primary"></i>
            <h3 class="fw-bold font-oswald mt-2">Reset Your Password</h3>
            <p class="text-muted small">Enter your email and we'll send you a reset link.</p>
          </div>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-2">Send Reset Link</button>
          </form>
          <div class="text-center mt-3">
            <a href="{% url 'accounts:login' %}" class="text-muted small">Back to login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
