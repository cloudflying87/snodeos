{% extends 'manage_panel/base.html' %}
{% block title %}Facebook Integration{% endblock %}
{% block active_facebook %}active{% endblock %}

{% block content %}
<div class="panel-page-header mb-4">
  <div>
    <h1 class="panel-page-title">Facebook Integration</h1>
    <p class="text-muted mb-0">Choose how this site connects with your Facebook Page.</p>
  </div>
</div>

<form method="post">
  {% csrf_token %}

  <!-- Option cards -->
  <div class="row g-4 mb-4">

    <!-- Disabled -->
    <div class="col-12">
      <label class="panel-card option-card {% if cfg.facebook_integration == 'none' %}selected{% endif %} d-flex align-items-start gap-3">
        <input type="radio" name="facebook_integration" value="none" class="mt-1 flex-shrink-0"
               {% if cfg.facebook_integration == 'none' %}checked{% endif %}>
        <div>
          <h5 class="mb-1 fw-bold">Disabled</h5>
          <p class="text-muted mb-0 small">No Facebook integration. Nothing changes on the site.</p>
        </div>
      </label>
    </div>

    <!-- Option 1 -->
    <div class="col-12">
      <label class="panel-card option-card {% if cfg.facebook_integration == 'plugin' %}selected{% endif %} d-flex align-items-start gap-3">
        <input type="radio" name="facebook_integration" value="plugin" class="mt-1 flex-shrink-0"
               {% if cfg.facebook_integration == 'plugin' %}checked{% endif %}>
        <div class="w-100">
          <div class="d-flex align-items-center gap-2 mb-1">
            <i class="bi bi-facebook text-primary fs-5"></i>
            <h5 class="mb-0 fw-bold">Option 1 — Facebook Page Plugin</h5>
            <span class="badge bg-success ms-1">Easy — no account setup</span>
          </div>
          <p class="text-muted small mb-2">
            Embeds a live timeline of your Facebook Page directly on the home page.
            Any post you make on Facebook automatically appears here — no extra steps.
          </p>
          <div class="alert alert-info py-2 small mb-2">
            <i class="bi bi-info-circle me-1"></i>
            <strong>How it works:</strong> A Facebook widget loads your public Page posts in an iframe.
            Visitors see your latest updates without leaving the site.
            Requires your Page to be <strong>public</strong>.
          </div>
          <div class="alert alert-warning py-2 small mb-0">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <strong>Limitation:</strong> Requires visitors to allow third-party cookies / not use
            a strict tracker blocker. Some users may not see the feed.
          </div>
          <div class="mt-3">
            <label class="form-label fw-semibold small">Your Facebook Page URL</label>
            <input type="url" name="facebook_page_url" class="form-control form-control-sm"
                   value="{{ cfg.facebook_page_url }}"
                   placeholder="https://www.facebook.com/yourpage">
          </div>
        </div>
      </label>
    </div>

    <!-- Option 3 -->
    <div class="col-12">
      <label class="panel-card option-card {% if cfg.facebook_integration == 'zapier' %}selected{% endif %} d-flex align-items-start gap-3">
        <input type="radio" name="facebook_integration" value="zapier" class="mt-1 flex-shrink-0"
               {% if cfg.facebook_integration == 'zapier' %}checked{% endif %}>
        <div class="w-100">
          <div class="d-flex align-items-center gap-2 mb-1">
            <i class="bi bi-send-fill text-warning fs-5"></i>
            <h5 class="mb-0 fw-bold">Option 3 — Zapier Auto-Post</h5>
            <span class="badge bg-warning text-dark ms-1">Requires free Zapier account</span>
          </div>
          <p class="text-muted small mb-2">
            Every time you post an <strong>Announcement</strong> on this site, it automatically
            gets posted to your Facebook Page via Zapier — no manual copy-pasting.
          </p>
          <div class="alert alert-info py-2 small mb-2">
            <i class="bi bi-info-circle me-1"></i>
            <strong>How to set up (one-time, ~10 minutes):</strong>
            <ol class="mb-0 mt-1 ps-3">
              <li>Create a free account at <a href="https://zapier.com" target="_blank">zapier.com</a></li>
              <li>Create a new Zap → Trigger: <strong>Webhooks by Zapier → Catch Hook</strong></li>
              <li>Copy the webhook URL Zapier gives you and paste it below</li>
              <li>Action: <strong>Facebook Pages → Create Page Post</strong></li>
              <li>Map the <code>title</code> and <code>body</code> fields from the webhook to your post</li>
              <li>Turn the Zap on — done!</li>
            </ol>
          </div>
          <div class="alert alert-warning py-2 small mb-0">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <strong>Note:</strong> Zapier's free plan allows 100 tasks/month (100 posts). Paid plans
            remove the limit. Only <em>new</em> announcements trigger the post — edits do not.
          </div>
          <div class="mt-3">
            <label class="form-label fw-semibold small">Zapier Catch Hook URL</label>
            <input type="url" name="zapier_webhook_url" class="form-control form-control-sm"
                   value="{{ cfg.zapier_webhook_url }}"
                   placeholder="https://hooks.zapier.com/hooks/catch/XXXXXX/XXXXXXX/">
            <div class="form-text">Get this URL from Zapier when you create the Catch Hook trigger.</div>
          </div>
        </div>
      </label>
    </div>

  </div>

  <button type="submit" class="btn btn-primary px-4">
    <i class="bi bi-save me-2"></i>Save Settings
  </button>

</form>

<style>
.option-card {
  cursor: pointer;
  border: 2px solid #e2eaf2;
  border-radius: 10px;
  padding: 1.25rem;
  transition: border-color 0.15s;
}
.option-card:hover { border-color: #0d6efd; }
.option-card.selected { border-color: #0d6efd; background: #f0f6ff; }
</style>

<script>
document.querySelectorAll('input[name="facebook_integration"]').forEach(radio => {
  radio.addEventListener('change', () => {
    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
    radio.closest('.option-card').classList.add('selected');
  });
});
</script>
{% endblock %}
