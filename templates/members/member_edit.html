{% extends 'manage_panel/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit {{ member.get_full_name }}{% endblock %}
{% block active_members %}active{% endblock %}

{% block content %}

<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h1 class="h3 fw-bold mb-1">Edit Member</h1>
    <p class="text-muted mb-0">{{ member.get_full_name }}</p>
  </div>
  <a href="{% url 'members:member_detail' member.pk %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Cancel
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card border-0 shadow-sm p-4 p-lg-5">
      {% crispy form %}
    </div>
  </div>
</div>

{% endblock %}
