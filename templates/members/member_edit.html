{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit {{ member.get_full_name }} — Brainerd Snodeos{% endblock %}

{% block content %}

<section class="page-hero py-4">
  <div class="container d-flex justify-content-between align-items-center">
    <h2 class="fw-bold font-oswald mb-0">Edit: {{ member.get_full_name }}</h2>
    <a href="{% url 'members:member_detail' member.pk %}" class="btn btn-outline-light btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Cancel
    </a>
  </div>
</section>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="card border-0 shadow-sm p-4 p-lg-5">
          {% crispy form %}
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
