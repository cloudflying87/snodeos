{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit My Profile — Brainerd Snodeos{% endblock %}

{% block content %}
<section class="page-hero bg-dark text-white py-4">
  <div class="container d-flex justify-content-between align-items-center">
    <h2 class="fw-bold font-oswald mb-0">Edit My Profile</h2>
    <a href="{% url 'members:dashboard' %}" class="btn btn-outline-light btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
    </a>
  </div>
</section>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card border-0 shadow-sm p-4 p-lg-5">
          {% crispy form %}
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
