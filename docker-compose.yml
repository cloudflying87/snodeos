services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:16295 --workers 3
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "16295:16295"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snodeos}
      POSTGRES_USER: ${POSTGRES_USER:-snodeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snodeos_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snodeos} -d ${POSTGRES_DB:-snodeos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/app/media:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - web
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres_data:
  media_files:
  static_files:
