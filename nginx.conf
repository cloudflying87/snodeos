upstream django {
    server web:16295;
}

server {
    listen 80;
    server_name snodeos.flyhomemnlab.com localhost;

    client_max_body_size 20M;

    # Images and fonts: long cache (content rarely changes)
    location ~* ^/static/.*\.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf)$ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # CSS and JS: no-cache so updates apply immediately
    location ~* ^/static/.*\.(css|js)$ {
        alias /app/staticfiles/;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Everything else in static
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
